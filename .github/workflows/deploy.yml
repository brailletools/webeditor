name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']

jobs:
  build_site:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout braille-bridge (pinned release, see braille-bridge.version)
        run: |
          VERSION=$(cat braille-bridge.version)
          git clone --branch "$VERSION" --depth 1 https://github.com/brailletools/braille-bridge.git "${{ github.workspace }}/../braille-bridge"

      - name: Checkout brailleocr (pinned release, see brailleocr.version)
        run: |
          VERSION=$(cat brailleocr.version)
          git clone --branch "$VERSION" --depth 1 https://github.com/brailletools/brailleocr.git "${{ github.workspace }}/../brailleocr"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install

      - name: build
        env:
          BASE_PATH: ''
        run: |
          pnpm run build

      - name: Upload Artifacts
        uses: actions/upload-pages-artifact@v3
        with:
          # this should match the `pages` option in your adapter-static options
          path: 'build/'

  deploy:
    needs: build_site
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
