name: Test

on:
  pull_request:

jobs:
  a11y:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout braille-bridge (pinned release, see braille-bridge.version)
        run: |
          VERSION=$(cat braille-bridge.version)
          git clone --branch "$VERSION" --depth 1 https://github.com/brailletools/braille-bridge.git "${{ github.workspace }}/../braille-bridge"

      - name: Checkout brailleocr (pinned release, see brailleocr.version)
        run: |
          VERSION=$(cat brailleocr.version)
          git clone --branch "$VERSION" --depth 1 https://github.com/brailletools/brailleocr.git "${{ github.workspace }}/../brailleocr"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Accessibility tests
        run: pnpm run test:a11y

  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout braille-bridge (pinned release, see braille-bridge.version)
        run: |
          VERSION=$(cat braille-bridge.version)
          git clone --branch "$VERSION" --depth 1 https://github.com/brailletools/braille-bridge.git "${{ github.workspace }}/../braille-bridge"

      - name: Checkout brailleocr (pinned release, see brailleocr.version)
        run: |
          VERSION=$(cat brailleocr.version)
          git clone --branch "$VERSION" --depth 1 https://github.com/brailletools/brailleocr.git "${{ github.workspace }}/../brailleocr"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Bidirectional sync tests
        run: pnpm run test:sync

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout braille-bridge (pinned release, see braille-bridge.version)
        run: |
          VERSION=$(cat braille-bridge.version)
          git clone --branch "$VERSION" --depth 1 https://github.com/brailletools/braille-bridge.git "${{ github.workspace }}/../braille-bridge"

      - name: Checkout brailleocr (pinned release, see brailleocr.version)
        run: |
          VERSION=$(cat brailleocr.version)
          git clone --branch "$VERSION" --depth 1 https://github.com/brailletools/brailleocr.git "${{ github.workspace }}/../brailleocr"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Unit tests
        run: pnpm run test:unit
