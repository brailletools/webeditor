name: Lint

on:
  pull_request:
  push:
    branches-ignore: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Checkout braille2latex (pinned release, see braille2latex.version)
        run: |
          VERSION=$(cat braille2latex.version)
          git clone --branch "$VERSION" --depth 1 https://github.com/brailletools/braille2latex.git "${{ github.workspace }}/../braille2latex"

      - name: Checkout brailleocr (pinned release, see brailleocr.version)
        run: |
          VERSION=$(cat brailleocr.version)
          git clone --branch "$VERSION" --depth 1 https://github.com/brailletools/brailleocr.git "${{ github.workspace }}/../brailleocr"

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install

      - name: Prettier + ESLint
        run: pnpm run lint

      - name: Svelte type check
        run: pnpm run check
