<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Braille to LaTeX Converter</title>
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- LaTeX rendering -->
		<script
			src="https://cdn.jsdelivr.net/npm/latex.js@0.12.6/dist/latex.js"
			integrity="sha384-3nqyv4lDQ6u8P5dVJpA0uHk6qZV+uWfH7xCqHML+E7x3Bdy2E3u9uYEc0pH+uP1P"
			crossorigin="anonymous"
		></script>
		<!-- PDF generation: html2pdf bundle (includes html2canvas and jsPDF) -->
		<script
			src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"
			integrity="sha384-U+u1nV6JYqX6vE/0QBy3n3lE+YlAq6S7f4G5pPp5c1mC8X2m7u3zXJv6sXw3w9J2"
			crossorigin="anonymous"
		></script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
