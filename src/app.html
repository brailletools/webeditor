<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Braille to LaTeX Converter</title>
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- LaTeX rendering -->
		<script src="https://cdn.jsdelivr.net/npm/latex.js@0.12.6/dist/latex.js"></script>
		<!-- liblouis Easy API glue code (vendored by @brailletools/liblouis-env-web's
		     liblouis-fetch-web, see package.json's dev/build scripts). Sets the global
		     `liblouis` that @brailletools/braille2latex's configure() expects. -->
		<script src="%sveltekit.assets%/liblouis/easy-api.js"></script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
