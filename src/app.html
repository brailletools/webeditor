<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<title>Braille to LaTeX Converter</title>
		<link rel="icon" href="%sveltekit.assets%/favicon.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<!-- LaTeX rendering -->
		<script
			src="https://cdn.jsdelivr.net/npm/latex.js@0.12.6/dist/latex.js"
			integrity="sha384-3nqyv4lDQ6u8P5dVJpA0uHk6qZV+uWfH7xCqHML+E7x3Bdy2E3u9uYEc0pH+uP1P"
			crossorigin="anonymous"
		></script>
		<!-- PDF generation dependencies -->
		<script
			src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"
			integrity="sha384-hcStbsswZB0ZkBKx/5v8P3wP4wGN9p3p9U+zX4P0H9QyJm0eJ5n2f7mXq3zJtC8Y"
			crossorigin="anonymous"
		></script>
		<script
			src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"
			integrity="sha384-7qvPp8zX9FtJQFJX5lQm0k9sC5sS7u2Xy5mHcV0R3yRM8aUo7D2iL5vQw9h+H8oC"
			crossorigin="anonymous"
		></script>
		<script
			src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"
			integrity="sha384-U+u1nV6JYqX6vE/0QBy3n3lE+YlAq6S7f4G5pPp5c1mC8X2m7u3zXJv6sXw3w9J2"
			crossorigin="anonymous"
		></script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
